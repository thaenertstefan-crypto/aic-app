<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1B1726" />
    <title>Offline · Anti Imposter Club</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 2rem 1.5rem;
        text-align: center;
        background: #1b1726;
        color: #f3effa;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .icon {
        width: 88px;
        height: 88px;
        opacity: 0.9;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
      }
      p {
        margin: 0;
        max-width: 22rem;
        line-height: 1.55;
        color: #8e84a6;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.75rem 1.5rem;
        border: 0;
        border-radius: 9999px;
        background: #e7b65e;
        color: #2b1b06;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:active {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <img class="icon" src="/icons/web-app-manifest-192x192.png" alt="" />
    <h1>Du bist offline</h1>
    <p>
      Es sieht so aus, als hättest du gerade keine Internetverbindung. Sobald du
      wieder online bist, geht es weiter.
    </p>
    <button type="button" onclick="location.reload()">Erneut versuchen</button>
  </body>
</html>
